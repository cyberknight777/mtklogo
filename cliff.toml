[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}

{% for commit in commits -%}
- {{ commit.message | split(pat="\n") | first | trim }} ({{ commit.id | truncate(length=7, end="") }})
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = false
filter_unconventional = false
require_conventional_base = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Documentation" },
  { message = "^cli", group = "CLI" },
  { message = "^src", group = "Core" },
  { message = "^Cargo", group = "Build" },
  { message = "^\\.github", group = "CI" },
  { message = "^ci", group = "CI" },
  { message = "^misc", group = "Miscellaneous" },
  { message = "^treewide", group = "Treewide" },
  { message = ".*", group = "Other" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"
